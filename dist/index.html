<!doctype html>
<html lang='pt-br'>

<head>
    <meta name="theme-color" content="#16A34A">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Controle Financeiro">
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <link rel="icon" href="/icons/favicon.ico">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap' rel='stylesheet'>
    <link rel='stylesheet' href='./assets/css/variables.css'>
    <link rel='stylesheet' href='./assets/css/layout.css'>
    <title>Controle Financeiro</title>
</head>

<body>
    <header>
        <div class="brand">Controle Financeiro</div>
    </header>

    <main id='app' role='main'>
        <section class="layout-grid">
            <div id="resumo" class="card summary-card">
                <h2>Resumo</h2>
                <p>Carregando resumo...</p>
            </div>

            <div id="ultimos" class="card list-card">
                <h2>Últimos lançamentos</h2>
                <p>Carregando lançamentos...</p>
            </div>
        </section>
    </main>

    <footer>
        <nav class="bottom-nav" role="navigation" aria-label="Navegação inferior">
            <a href="#home" data-route="home" class="bn-item">
                <span class="icon"> <!-- home svg -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 11.5L12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-8.5z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
                <span class="label">Home</span>
            </a>
            <a href="#historico" data-route="historico" class="bn-item">
                <span class="icon"> <!-- history svg -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 12a9 9 0 1 0-1.2 4.6L21 21" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 7v6l4 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
                <span class="label">Histórico</span>
            </a>
            <button type="button" class="bn-fab" aria-label="Novo lançamento">+</button>
            <a href="#dashboard" data-route="dashboard" class="bn-item">
                <span class="icon"> <!-- chart svg -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 3v18h18" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 13v6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 9v10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M17 5v14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
                <span class="label">Dashboard</span>
            </a>
            <a href="#configuracoes" data-route="configuracoes" class="bn-item">
                <span class="icon"> <!-- settings svg -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a1 1 0 0 1-.5 1.6 12 12 0 0 1-3.3 1.1 1 1 0 0 0-.7.9v.3a1 1 0 0 1-1 1h-1.4a1 1 0 0 1-1-1v-.3a1 1 0 0 0-.7-.9 12 12 0 0 1-3.3-1.1 1 1 0 0 1-.5-1.6l.1-.1A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.1-1.5 1 1 0 0 1-.6-1.1 12 12 0 0 1 .4-3.4 1 1 0 0 0-.3-1 1 1 0 0 1 0-1.6 12 12 0 0 1 2.6-2.8 1 1 0 0 0 .4-1.1 1.7 1.7 0 0 0-1-1.3 1 1 0 0 1 .3-1.6 12 12 0 0 1 3.3-1.1 1 1 0 0 0 .7-.9V2a1 1 0 0 1 1-1h1.4a1 1 0 0 1 1 1v.3c0 .4.4.8.7.9A12 12 0 0 1 18 4.3a1 1 0 0 1 .3 1.6 1.7 1.7 0 0 0-1 1.3 1 1 0 0 0 .4 1.1 12 12 0 0 1 2.6 2.8 1 1 0 0 1 0 1.6c-.2.3-.4.5-.6.6a1.7 1.7 0 0 0-1.1 1.5z" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
                <span class="label">Ajustes</span>
            </a>
        </nav>
    </footer>

    <script type='module' src='./assets/js/app.js'></script>
    <script src="/pwa.js"></script>
    <script>
        if ('serviceWorker' in navigator){
            window.addEventListener('load', ()=>{
            navigator.serviceWorker.register('/sw.js');
        });
    }
    </script>

</body>

</html>
